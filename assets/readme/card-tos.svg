<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" width="420" height="130">
  <defs>
    <linearGradient id="tosG" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B0000">
        <animate attributeName="stop-color"
                 values="#8B0000;#5A0606;#8B0000;#B11212;#8B0000"
                 dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0B0B0D">
        <animate attributeName="stop-color"
                 values="#0B0B0D;#160404;#0B0B0D;#200808;#0B0B0D"
                 dur="7s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <radialGradient id="tosGlow" cx="80%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(177,18,18,0.35)" />
      <stop offset="100%" stop-color="rgba(177,18,18,0)" />
    </radialGradient>
  </defs>
  <rect width="420" height="130" rx="14" fill="url(#tosG)" />
  <rect width="420" height="130" rx="14" fill="url(#tosGlow)" />
  <rect x="0.5" y="0.5" width="419" height="129" rx="13.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
  <text x="32" y="42" fill="rgba(255,255,255,0.85)" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2">LEGAL</text>
  <text x="32" y="84" fill="#fff" font-family="Inter Tight, system-ui, sans-serif" font-size="32" font-weight="700" letter-spacing="-1">tos</text>
  <text x="32" y="108" fill="rgba(255,255,255,0.65)" font-family="Inter, system-ui, sans-serif" font-size="13">termos de serviço</text>
  <text x="384" y="78" fill="#fff" font-family="Inter Tight, system-ui, sans-serif" font-size="32" font-weight="700">→</text>
</svg>
